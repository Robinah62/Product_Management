{% extends 'shop/base.html' %}
{% block title %}Confirm Delete – Kibuuka's Shop{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-12 col-md-6 col-lg-4">
        <div class="card border-danger">
            <div class="card-body text-center p-5">
                <div style="width:70px;height:70px;background:#fadbd8;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
                    <i class="fa-solid fa-trash fa-2x" style="color:var(--danger)"></i>
                </div>
                <h5 class="fw-bold mb-2">Delete {{ type }}?</h5>
                <p class="text-muted mb-4">You are about to delete <strong>{{ object }}</strong>. This action cannot be undone.</p>
                <form method="post" class="d-flex gap-2">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger flex-fill fw-bold">
                        <i class="fa-solid fa-trash me-1"></i>Yes, Delete
                    </button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary flex-fill">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
