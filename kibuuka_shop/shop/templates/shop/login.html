<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Kibuuka's Corner Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream:        #F2E4D0;
            --cream-dark:   #DFD0B8;
            --cream-light:  #FAF6F0;
            --terra:        #B07850;
            --terra-dark:   #8C5C38;
            --terra-light:  #CA9872;
            --espresso:     #2C1A0E;
            --espresso-mid: #4A2E1A;
            --white:        #FFFFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: var(--cream-light);
            background-image: radial-gradient(var(--cream-dark) 1px, transparent 1px);
            background-size: 24px 24px;
            font-family: 'Nunito', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--white);
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 12px 40px rgba(44,26,14,.12);
            border: 1.5px solid var(--cream-dark);
            overflow: hidden;
        }

        /* ── TOP BANNER ── */
        .card-top {
            background: var(--espresso);
            padding: 36px 40px 32px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .card-top::before {
            content: '';
            position: absolute;
            width: 180px; height: 180px;
            border-radius: 50%;
            background: rgba(176,120,80,.12);
            top: -60px; right: -50px;
        }
        .card-top::after {
            content: '';
            position: absolute;
            width: 120px; height: 120px;
            border-radius: 50%;
            background: rgba(242,228,208,.06);
            bottom: -40px; left: -30px;
        }
        .shop-icon-wrap {
            width: 72px; height: 72px;
            background: var(--terra);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 18px;
            position: relative; z-index: 1;
            box-shadow: 0 8px 24px rgba(176,120,80,.45);
        }
        .shop-icon-wrap i { font-size: 2rem; color: var(--white); }
        .shop-name {
            font-family: 'Poppins', sans-serif;
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--cream);
            position: relative; z-index: 1;
        }
        .shop-location {
            color: var(--terra-light);
            font-size: .78rem;
            font-weight: 600;
            margin-top: 6px;
            position: relative; z-index: 1;
        }

        /* ── FORM AREA ── */
        .card-body {
            padding: 36px 40px 32px;
        }
        .form-heading {
            font-family: 'Poppins', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--espresso);
            margin-bottom: 4px;
        }
        .form-subheading {
            color: #9C8070;
            font-size: .83rem;
            margin-bottom: 28px;
        }
        .field-label {
            display: block;
            font-size: .78rem;
            font-weight: 800;
            color: var(--espresso-mid);
            text-transform: uppercase;
            letter-spacing: .07em;
            margin-bottom: 7px;
        }
        .input-wrap {
            position: relative;
            margin-bottom: 20px;
        }
        .input-wrap .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--terra);
            font-size: .9rem;
            pointer-events: none;
        }
        .input-wrap input {
            width: 100%;
            padding: 13px 14px 13px 42px;
            border: 2px solid var(--cream-dark);
            border-radius: 12px;
            font-size: .92rem;
            font-family: 'Nunito', sans-serif;
            color: var(--espresso);
            background: var(--cream-light);
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }
        .input-wrap input:focus {
            border-color: var(--terra);
            box-shadow: 0 0 0 3px rgba(176,120,80,.15);
            background: var(--white);
        }
        .input-wrap input::placeholder { color: #C0A898; }

        /* ── BUTTON ── */
        .btn-signin {
            width: 100%;
            padding: 14px;
            background: var(--espresso);
            border: none;
            border-radius: 12px;
            color: var(--cream);
            font-family: 'Poppins', sans-serif;
            font-size: .95rem;
            font-weight: 700;
            letter-spacing: .02em;
            cursor: pointer;
            transition: background .2s, transform .15s, box-shadow .2s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-signin:hover {
            background: var(--terra);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(176,120,80,.4);
            color: var(--white);
        }

        /* ── ERROR ALERT ── */
        .error-alert {
            background: #FAEAE9;
            border: 1.5px solid #EAC0BC;
            border-radius: 10px;
            padding: 11px 14px;
            color: #7A2018;
            font-size: .85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 9px;
            margin-bottom: 22px;
        }

        /* ── FOOTER ── */
        .card-footer-text {
            text-align: center;
            padding: 14px 40px 18px;
            border-top: 1.5px solid var(--cream);
            color: #C0A898;
            font-size: .73rem;
        }

        @media (max-width: 480px) {
            .card-top  { padding: 28px 24px 24px; }
            .card-body { padding: 28px 24px 24px; }
            .card-footer-text { padding: 14px 24px 18px; }
        }
    </style>
</head>
<body>

<div class="login-card">

    <!-- TOP BANNER -->
    <div class="card-top">
        <div class="shop-icon-wrap">
            <i class="fa-solid fa-store"></i>
        </div>
        <div class="shop-name">Kibuuka's Corner Shop</div>
        <div class="shop-location">
            <i class="fa-solid fa-location-dot me-1"></i>Nateete Market, Kampala
        </div>
    </div>

    <!-- FORM AREA -->
    <div class="card-body">

        <div class="form-heading">Welcome Back</div>
        <div class="form-subheading">Sign in to access your shop dashboard</div>

        {% if messages %}
            {% for message in messages %}
            <div class="error-alert">
                <i class="fa-solid fa-circle-exclamation"></i>
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div>
                <label class="field-label">Username</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-user field-icon"></i>
                    <input
                        type="text"
                        name="username"
                        placeholder="Enter your username"
                        autofocus
                        required
                    >
                </div>
            </div>

            <div>
                <label class="field-label">Password</label>
                <div class="input-wrap">
                    <i class="fa-solid fa-lock field-icon"></i>
                    <input
                        type="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                    >
                </div>
            </div>

            <button type="submit" class="btn-signin">
                <i class="fa-solid fa-right-to-bracket"></i>
                Sign In
            </button>

        </form>
    </div>

    <!-- FOOTER -->
    <div class="card-footer-text">
        &copy; 2025 Kibuuka's Corner Shop &nbsp;&bull;&nbsp; Shop Management System
    </div>

</div>

</body>
</html>
